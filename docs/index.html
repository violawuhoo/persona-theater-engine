<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Persona Draft</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
  <style>
    /* ── DETAIL PANEL ─────────────────────────────────────────── */
    /* position:fixed escapes body/html overflow:hidden + #app height:100vh clipping */
    #detail-panel {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      background: #000;
      z-index: 500;
      padding: 28px 22px 72px;
      box-sizing: border-box;
      max-width: 480px;
      margin: 0 auto;
    }
    /* ── Transitions ── */
    @keyframes detail-in  { from { opacity:0; transform:translateY(18px) } to { opacity:1; transform:translateY(0) } }
    @keyframes detail-out { from { opacity:1 } to { opacity:0 } }
    #detail-panel.detail-entering { animation: detail-in  0.22s ease-out forwards; }
    #detail-panel.detail-leaving  { animation: detail-out 0.14s ease-in  forwards; }
    /* ── Header ── */
    .detail-header { padding: 12px 0 20px; border-bottom: 1px solid rgba(255,255,255,0.08); margin-bottom: 22px; }
    .detail-name   { font-size: 22px; font-weight: bold; letter-spacing: 1px; }
    /* ── Sections ── */
    .detail-section {
      margin: 14px 0;
      padding: 13px 15px;
      border-radius: 10px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .detail-section--core     { background: rgba(0,242,255,0.04); border-color: rgba(0,242,255,0.2); }
    .detail-section--forbidden{ background: rgba(224,90,32,0.04); border-color: rgba(224,90,32,0.2); }
    .detail-section-label {
      font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
      opacity: 0.5; margin-bottom: 8px;
    }
    .detail-section--core      .detail-section-label { color: #00f2ff; opacity: 0.7; }
    .detail-section--forbidden .detail-section-label { color: #e05a20; opacity: 0.7; }
    .detail-core-text    { font-size: 14px; line-height: 1.7; color: #e8f4f8; }
    .detail-section-value{ font-size: 13.5px; line-height: 1.65; color: #c0d4de; white-space: pre-wrap; }
    /* ── Typical expressions ── */
    .detail-expressions { display: flex; flex-direction: column; gap: 7px; }
    .detail-expr-line {
      padding: 7px 10px;
      border-left: 2px solid rgba(255,255,255,0.15);
      font-size: 13px; color: #b0c8d8; line-height: 1.5;
      /* Fix 1: truncate long verbal_output lines to one visible line */
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    /* ── Actions ── */
    .detail-actions { display: flex; gap: 12px; margin-top: 28px; }
    .detail-actions .btn { flex: 1; }
    .detail-btn-back {
      background: transparent !important;
      border: 1px solid rgba(255,255,255,0.18) !important;
      color: #888 !important; box-shadow: none !important;
    }
  </style>
</head>
<body>
 
  <!-- Custom Modal — replaces browser alert() / confirm() -->
  <div id="modal-overlay" class="hidden">
    <div id="modal-box">
      <div id="modal-title"></div>
      <div id="modal-message"></div>
      <div id="modal-actions">
        <button id="modal-cancel" class="modal-btn modal-btn--cancel hidden">取消</button>
        <button id="modal-confirm" class="modal-btn modal-btn--confirm">确认</button>
      </div>
    </div>
  </div>

  <div id="sync-overlay" class="hidden">
    <div class="scan-line"></div>
    <div class="sync-box">
      <div class="sync-title">PERSONA PROTOCOL SYNCING</div>
      <div class="sync-persona-name" id="sync-persona-name">Load...</div>
      <div class="sync-status">
        <span class="status-label">BIOMETRIC:</span> <span class="status-value">STABLE</span><br>
        <span class="status-label">EMOTION:</span> <span class="status-valueSuppress">SUPPRESSED</span><br>
        <span class="status-label">LOGIC_CORE:</span> <span class="status-value">ONLINE</span>
      </div>
      <div class="sync-progress-bar">
        <div class="sync-progress-fill"></div>
      </div>
    </div>
  </div>
  
  <div id="app">
      <header>Persona Draft</header>

      <div class="carousel" id="carousel">...</div>
      <div class="dots" id="dots"></div>

    <!-- ── DETAIL VIEW (Browse → Detail → Config) ─────────────── -->
    <div id="detail-panel" class="hidden">
      <div class="detail-header">
        <div id="detail-persona-name" class="detail-name"></div>
      </div>

      <div class="detail-section detail-section--core">
        <div class="detail-section-label">核心本质</div>
        <div id="detail-core-essence" class="detail-core-text"></div>
      </div>

      <div class="detail-section">
        <div class="detail-section-label">社交本质</div>
        <div id="detail-social-essence" class="detail-section-value"></div>
      </div>

      <div class="detail-section">
        <div class="detail-section-label">典型表达</div>
        <div id="detail-expressions" class="detail-expressions"></div>
      </div>

      <div class="detail-section detail-section--forbidden">
        <div class="detail-section-label">禁忌</div>
        <div id="detail-forbidden" class="detail-section-value"></div>
      </div>

      <div class="detail-actions">
        <button class="btn detail-btn-back" onclick="closePersonaDetail()">← 返回筛选</button>
        <button class="btn" id="detail-activate-btn" onclick="activateFromDetail()">激活面具</button>
      </div>
    </div>

      <!-- 确保这个面板在最外层 -->
    <div id="config-panel" class="hidden">
      <div class="panel-header">配置实验：<span id="active-persona-display"></span></div>

      <div class="input-group">
        <label>环境场景</label>
        <select id="scene-select">
          <option value="商务谈判/签约">商务谈判/签约</option>
          <option value="半正式晚宴/酒局">半正式晚宴/酒局</option>
          <option value="部门会议/述职">部门会议/述职</option>
          <option value="面试/潜在合伙人面谈">面试/潜在合伙人面谈</option>
          <option value="私人社交/相亲">私人社交/相亲</option>
          <option value="偶然遭遇战">偶然遭遇战</option>
        </select>
      </div>

      <div class="input-group">
        <label>核心对手</label>
        <select id="target-select">
          <option value="甲方/决策者">甲方/决策者</option>
          <option value="竞争对手/同行">竞争对手/同行</option>
          <option value="下属/执行层">下属/执行层</option>
          <option value="朋友/熟人">朋友/熟人</option>
          <option value="陌生人/潜在资源">陌生人/潜在资源</option>
        </select>
      </div>

      <div class="input-group">
        <label>场域规模</label>
        <select id="scale-select">
          <option value="1-3人 (深度对谈)">1-3人 (深度对谈)</option>
          <option value="3-5人 (小组博弈)">3-5人 (小组博弈)</option>
          <option value="5-8人 (多变量社交)">5-8人 (多变量社交)</option>
          <option value=">8人 (群体观察)">>8人 (群体观察)</option>
        </select>
      </div>

      <div class="input-group">
        <label>核心目的 (你的社交戏纲)</label>
        <textarea id="intention-input" placeholder="例如：在不暴露底价的情况下，试探对方的合作诚意。"></textarea>
      </div>

      <button class="btn start-btn" onclick="startTheater()">启动剧场模式</button>
    </div>

    <!-- 在 <div id="app"> 内部，config-panel 之后添加 -->
    <div id="theater-screen" class="hidden">
      <div class="theater-header">剧场模式：运行中</div>

      <!-- 核心轮轴区域 -->
      <div class="wheel-container">
        <div id="main-wheel" class="wheel">
          <div class="sector" style="--i:0"><span>逻辑</span></div>
          <div class="sector" style="--i:1"><span>行为</span></div>
          <div class="sector" style="--i:2"><span>语言</span></div>
          <div class="sector" style="--i:3"><span>反应</span></div>
        </div>
        <div class="pointer"></div>
      </div>

      <!-- 内容展示区域 -->
      <div class="guidance-box">
        <h3 id="guidance-title">底层心法</h3>
        <p id="guidance-content">正在加载同步人格参数...</p>
      </div>

      <button class="btn exit-btn" onclick="exitTheater()">卸载面具 (退出)</button>
    </div>
    
  </div>

  <!-- State module: must load before script.js -->
  <script src="state/app-state.js"></script>
  <script src="script.js"></script>
</body>
</html>
